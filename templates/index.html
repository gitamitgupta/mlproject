<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Student Math Score Predictor</title>
  <style>
    :root {
      --bg1: #f7efe5;
      --bg2: #dce8c8;
      --ink: #17301f;
      --card: #ffffffcc;
      --accent: #2d6a4f;
      --accent-2: #40916c;
      --ring: #95d5b2;
      --danger: #a4161a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 15% 20%, #ffe8d6 0%, transparent 30%),
                  radial-gradient(circle at 85% 80%, #b7e4c7 0%, transparent 30%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(900px, 100%);
      backdrop-filter: blur(10px);
      background: var(--card);
      border: 1px solid #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(23, 48, 31, 0.15);
      overflow: hidden;
      animation: rise 450ms ease-out;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    header {
      padding: 24px;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
    }
    h1 { margin: 0; font-size: 1.6rem; }
    p { margin: 10px 0 0; opacity: 0.95; }
    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 24px;
    }
    .full { grid-column: 1 / -1; }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cfd8d2;
      border-radius: 10px;
      background: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px color-mix(in oklab, var(--ring) 50%, white);
    }
    button {
      width: 100%;
      border: 0;
      background: var(--accent);
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, filter 0.2s;
    }
    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); }
    .hint {
      font-size: 0.85rem;
      color: #2f3e46;
      margin-top: 6px;
    }
    @media (max-width: 700px) {
      form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <header>
      <h1>Student Math Score Predictor</h1>
      <p>Enter student profile details to estimate the math score.</p>
    </header>

    <form action="/predict" method="post">
      <div>
        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
          <option value="female">Female</option>
          <option value="male">Male</option>
        </select>
      </div>

      <div>
        <label for="race_ethnicity">Race/Ethnicity</label>
        <select id="race_ethnicity" name="race_ethnicity" required>
          <option value="group A">Group A</option>
          <option value="group B">Group B</option>
          <option value="group C">Group C</option>
          <option value="group D">Group D</option>
          <option value="group E">Group E</option>
        </select>
      </div>

      <div>
        <label for="parental_level_of_education">Parental Education</label>
        <select id="parental_level_of_education" name="parental_level_of_education" required>
          <option value="some high school">Some High School</option>
          <option value="high school">High School</option>
          <option value="some college">Some College</option>
          <option value="associate's degree">Associate's Degree</option>
          <option value="bachelor's degree">Bachelor's Degree</option>
          <option value="master's degree">Master's Degree</option>
        </select>
      </div>

      <div>
        <label for="lunch">Lunch</label>
        <select id="lunch" name="lunch" required>
          <option value="standard">Standard</option>
          <option value="free/reduced">Free/Reduced</option>
        </select>
      </div>

      <div>
        <label for="test_preparation_course">Test Preparation Course</label>
        <select id="test_preparation_course" name="test_preparation_course" required>
          <option value="none">None</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <div>
        <label for="reading_score">Reading Score</label>
        <input id="reading_score" name="reading_score" type="number" min="0" max="100" step="1" required>
      </div>

      <div>
        <label for="writing_score">Writing Score</label>
        <input id="writing_score" name="writing_score" type="number" min="0" max="100" step="1" required>
      </div>

      <div class="full">
        <button type="submit">Predict Math Score</button>
        <p class="hint">The model uses preprocessing and prediction in one Scikit-learn pipeline.</p>
      </div>
    </form>
  </main>
</body>
</html>
