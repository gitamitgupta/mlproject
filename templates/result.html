<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prediction Result</title>
  <style>
    :root {
      --bg: #edf6f9;
      --ink: #12263a;
      --card: #ffffff;
      --accent: #006d77;
      --accent-2: #83c5be;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--bg), #ffddd2);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(560px, 100%);
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 16px 34px rgba(18, 38, 58, 0.14);
      border: 1px solid #ffffff;
      animation: pop 350ms ease-out;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    h1 {
      margin: 0;
      color: var(--accent);
      font-size: 1.5rem;
    }
    .prediction {
      margin: 18px 0 22px;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 14px;
      border-radius: 12px;
      background: linear-gradient(120deg, color-mix(in oklab, var(--accent-2) 60%, white), #fff);
    }
    a {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Prediction Result</h1>
    <div class="prediction">{{ prediction_text }}</div>
    <a href="/">Try Another Prediction</a>
  </main>
</body>
</html>
